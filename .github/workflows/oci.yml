name: OCI Auto Create VM
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      OCI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_COMPARTMENT: ${{ secrets.OCI_COMPARTMENT_ID }}
      OCI_IMAGE: ${{ secrets.OCI_IMAGE_ID }}
      OCI_SUBNET: ${{ secrets.OCI_SUBNET_ID }}
      SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          python3 << 'PYEOF'
          import os, base64
          home = os.path.expanduser('~')
          user = os.environ['OCI_USER'].strip()
          fingerprint = os.environ['OCI_FINGERPRINT'].strip()
          tenancy = os.environ['OCI_TENANCY'].strip()
          config = '[DEFAULT]\nuser=' + user + '\nfingerprint=' + fingerprint + '\ntenancy=' + tenancy + '\nregion=ap-singapore-1\nkey_file=' + home + '/.oci/key.pem\n'
          with open(home + '/.oci/config', 'w') as f:
            f.write(config)
          key = base64.b64decode(os.environ['OCI_KEY'].strip()).decode('utf-8')
          with open(home + '/.oci/key.pem', 'w') as f:
            f.write(key)
          PYEOF
          chmod 600 ~/.oci/key.pem ~/.oci/config

      - name: Verify config
        run: |
          echo "=== Config ==="
          cat ~/.oci/config | cat -A
          echo "=== Key head ==="
          head -1 ~/.oci/key.pem
          echo "=== Key tail ==="
          tail -1 ~/.oci/key.pem

      - name: Create VM
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key.pub
          oci compute instance launch --profile DEFAULT --availability-domain "AP-SINGAPORE-1-AD-1" --compartment-id "$OCI_COMPARTMENT" --shape "VM.Standard.A1.Flex" --shape-config '{"ocpus":4,"memoryInGBs":24}' --image-id "$OCI_IMAGE" --subnet-id "$OCI_SUBNET" --assign-public-ip true --boot-volume-size-in-gbs 50 --ssh-authorized-keys-file /tmp/ssh_key.pub
