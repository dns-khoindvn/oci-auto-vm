name: OCI Auto Create VM
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      OCI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_COMPARTMENT: ${{ secrets.OCI_COMPARTMENT_ID }}
      OCI_IMAGE: ${{ secrets.OCI_IMAGE_ID }}
      OCI_SUBNET: ${{ secrets.OCI_SUBNET_ID }}
      SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=$OCI_USER" >> ~/.oci/config
          echo "fingerprint=$OCI_FINGERPRINT" >> ~/.oci/config
          echo "tenancy=$OCI_TENANCY" >> ~/.oci/config
          echo "region=ap-singapore-1" >> ~/.oci/config
          echo "key_file=$HOME/.oci/key.pem" >> ~/.oci/config
          printf '%s' "$OCI_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          chmod 600 ~/.oci/config
          cat ~/.oci/config
          head -1 ~/.oci/key.pem

      - name: Create VM
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key.pub
          oci compute instance launch \
            --availability-domain "AP-SINGAPORE-1-AD-1" \
            --compartment-id "$OCI_COMPARTMENT" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --image-id "$OCI_IMAGE" \
            --subnet-id "$OCI_SUBNET" \
            --assign-public-ip true \
            --boot-volume-size-in-gbs 50 \
            --ssh-authorized-keys-file /tmp/ssh_key.pub
