      - name: Configure OCI
        env:
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
[DEFAULT]
user=${OCI_USER}
fingerprint=${OCI_FINGERPRINT}
tenancy=${OCI_TENANCY}
region=ap-singapore-1
key_file=${HOME}/.oci/key.pem
EOF
          printf '%s' "${OCI_KEY}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          chmod 600 ~/.oci/config
          echo "=== CONFIG ==="
          cat ~/.oci/config
          echo "=== KEY HEAD ==="
          head -1 ~/.oci/key.pem
